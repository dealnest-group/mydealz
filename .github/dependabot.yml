# Dependabot config — auto-opens PRs to keep deps fresh and patched.
# Docs: https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  # TypeScript/JavaScript deps across the whole monorepo
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    reviewers:
      - dealnest-group/maintainers
    labels:
      - dependencies
      - javascript
    # Group minor/patch updates into a single PR so we don't drown in noise.
    # Major bumps stay separate — they need real review.
    groups:
      dev-dependencies:
        dependency-type: development
        update-types: [minor, patch]
      prod-minor-patch:
        dependency-type: production
        update-types: [minor, patch]

  # Python deps for the agents
  - package-ecosystem: pip
    directory: /packages/agents
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/London
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - python

  # GitHub Actions versions (e.g. actions/checkout@v4 → v5)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - github-actions
